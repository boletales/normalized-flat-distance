<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFD 勾配係数表</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="simple-page">
      <section class="simple-card">
        <h1>NFD 勾配係数表</h1>
        <p class="muted">抵抗係数（Crr, CdA）と平地出力 P_0 を入力して、勾配ごとの係数表を作成します。</p>

        <div class="simple-grid">
          <label>
            Crr
            <input id="crrInput" type="number" step="0.0001" min="0" value="0.004" />
          </label>

          <label>
            CdA [m²]
            <input id="cdaInput" type="number" step="0.01" min="0" value="0.32" />
          </label>

          <label>
            P_0 [W]
            <input id="p0Input" type="number" step="1" min="1" value="150" />
          </label>

          <label>
            勾配下限 [%]
            <input id="minGradeInput" type="number" step="1" value="-15" />
          </label>

          <label>
            勾配上限 [%]
            <input id="maxGradeInput" type="number" step="1" value="15" />
          </label>

          <label>
            勾配刻み [%]
            <input id="stepGradeInput" type="number" step="1" min="1" value="1" />
          </label>
        </div>

        <div class="buttons" style="margin-top:10px;">
          <button id="generateButton">係数表を生成</button>
          <button id="csvButton" class="secondary">CSV出力</button>
        </div>

        <div id="summary" class="summary" style="margin-top:10px;">パラメータを入力して「係数表を生成」を押してください。</div>
        <div id="error" class="error"></div>
        <p><a href="./index.html">← Pilot Viewer に戻る</a></p>
      </section>

      <section class="simple-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>勾配 [%]</th>
                <th>想定速度 [km/h]</th>
                <th>想定パワー [W]</th>
                <th>NFD係数 c(n)</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./grade-coeff.js"></script>
  </body>
</html>
